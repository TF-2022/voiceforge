name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Download whisper.cpp + ffmpeg
        run: node scripts/download-binaries.mjs

      - name: Build & Package
        run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Download whisper.cpp + ffmpeg
        run: |
          brew install whisper-cpp ffmpeg
          mkdir -p resources/bin/mac
          cp $(which whisper-cpp) resources/bin/mac/whisper-cli || true
          cp $(which ffmpeg) resources/bin/mac/ffmpeg
          chmod +x resources/bin/mac/*

      - name: Build & Package
        run: npm run build && npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [build-windows, build-macos]
    if: always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish draft release
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
